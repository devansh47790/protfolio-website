<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/site-icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Devansh Patel - Portfolio</title>
    <meta name="description" content="Portfolio, projects, and writing by Devansh Patel." />
    <meta name="theme-color" content="#000000" />
    <script>
      (function () {
        var canonicalHost = 'akime.com.au';
        var canonicalOrigin = 'https://' + canonicalHost;
        var canonicalUrl = canonicalOrigin + window.location.pathname + window.location.search;

        if (window.location.hostname !== canonicalHost) {
          window.location.replace(canonicalUrl + window.location.hash);
          return;
        }

        var canonical = document.createElement('link');
        canonical.rel = 'canonical';
        canonical.href = canonicalUrl;
        document.head.appendChild(canonical);

        var robots = document.createElement('meta');
        robots.name = 'robots';
        robots.content = 'index, follow';
        document.head.appendChild(robots);
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
